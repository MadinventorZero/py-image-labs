<section id="step-process">
  <div class="step-title">Step 2 of 7 — Image Processing</div>
  <div class="step-sub">Configure how the source image is isolated and adjusted.</div>

  <label class="check-row">
    <input type="checkbox" id="cb-remove-bg">
    <span>Remove background <span class="muted">(rembg BiRefNet)</span></span>
  </label>
  <label class="check-row">
    <input type="checkbox" id="cb-crop">
    <span>Auto-crop to subject</span>
  </label>
  <div class="field-row indent" id="crop-padding-row">
    <span class="field-label">Crop padding</span>
    <select id="sel-padding">
      <option value="0.05">5%</option>
      <option value="0.08">8%</option>
      <option value="0.12">12%</option>
      <option value="0.15">15%</option>
      <option value="0.20">20%</option>
      <option value="0.25">25%</option>
    </select>
  </div>
  <div class="field-row">
    <span class="field-label">Rotation</span>
    <select id="sel-rotate">
      <option value="0">None (0°)</option>
      <option value="90">90° Clockwise</option>
      <option value="180">180°</option>
      <option value="270">90° Counter-clockwise</option>
    </select>
  </div>
  <div class="field-row">
    <span class="field-label">Resize</span>
    <select id="sel-resize">
      <option value="100">Original size</option>
      <option value="75">75%</option>
      <option value="50">50%</option>
      <option value="25">25%</option>
    </select>
  </div>
</section>

<script>
window.onViewLoad = function({ state }) {
  const ip = state.config.imgProc;

  const cbBg   = document.getElementById('cb-remove-bg');
  const cbCrop = document.getElementById('cb-crop');
  const selPad = document.getElementById('sel-padding');
  const selRot = document.getElementById('sel-rotate');
  const selRes = document.getElementById('sel-resize');
  const cropRow = document.getElementById('crop-padding-row');

  cbBg.checked   = ip.remove_bg;
  cbCrop.checked = ip.crop_to_subject;
  selPad.value   = String(ip.crop_padding);
  selRot.value   = String(ip.rotate_degrees);
  selRes.value   = String(ip.resize_pct);
  cropRow.hidden = !ip.crop_to_subject;

  cbBg.addEventListener('change', e => { ip.remove_bg = e.target.checked; });
  cbCrop.addEventListener('change', e => {
    ip.crop_to_subject = e.target.checked;
    cropRow.hidden = !e.target.checked;
  });
  selPad.addEventListener('change', e => { ip.crop_padding = parseFloat(e.target.value); });
  selRot.addEventListener('change', e => { ip.rotate_degrees = parseInt(e.target.value); });
  selRes.addEventListener('change', e => { ip.resize_pct = parseInt(e.target.value); });
};
</script>
