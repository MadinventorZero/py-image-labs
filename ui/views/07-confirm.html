<section id="step-confirm">
  <div class="step-title">Step 7 of 7 — Confirm &amp; Run</div>
  <div class="step-sub">Review your settings, then click Run.</div>

  <div class="summary" id="summary-table"></div>
</section>

<script>
window.onViewLoad = function ({ state }) {
  document.getElementById('btn-next').textContent = 'Run';
  renderSummary(state.config);

  document.getElementById('wizard-content').addEventListener('wizardsave', (e) => {
    e.detail.asyncDone = Api.startRender(buildPayload(state.config));
  }, { once: true });
};

function renderSummary(cfg) {
  const sizeMap = {
    youtube_thumbnail: 'YouTube Thumbnail',
    channel_art:       'Channel Art',
    podcast_square:    'Podcast Square',
  };
  const sizesLabel = Object.entries(cfg.sizes)
    .filter(([, v]) => v).map(([k]) => sizeMap[k] || k).join(', ') || 'None';

  const stack = cfg.effectStack || [];
  const activeEffects = stack
    .filter(l => l.enabled && l.id !== 'tagline')
    .map(l => (EFFECT_LIBRARY[l.id]?.label || l.id))
    .join(', ') || 'None';

  const fmt = cfg.output || {};
  const formats = [
    fmt.gif      && 'GIF',
    fmt.webp     && 'WebP',
    fmt.mp4      && 'MP4',
    fmt.apng     && 'APNG',
    fmt.png_peak && 'PNG (peak)',
  ].filter(Boolean).join(', ') || 'None';

  const rows = [
    ['source',  cfg.inputPath || '—'],
    ['output',  cfg.outputDir || '—'],
    ['sizes',   sizesLabel],
    ['formats', formats],
    ['effects', activeEffects],
  ];

  const tagLayer = stack.find(l => l.id === 'tagline' && l.enabled);
  if (tagLayer) rows.push(['tagline', cfg.tagline?.text || '']);

  document.getElementById('summary-table').innerHTML = rows.map(([k, v]) =>
    `<div class="s-row"><div class="s-key">${k}</div><div class="s-val">${v}</div></div>`
  ).join('');
}

function buildPayload(cfg) {
  const t  = cfg.tagline || {};
  const h  = (t.color_hex || '#DCBE78').replace('#', '').padEnd(6, '0');
  return {
    inputPath:    cfg.inputPath,
    outputDir:    cfg.outputDir,
    imgProc:      cfg.imgProc,
    sizes:        cfg.sizes,
    output_static: (cfg.output?.png_peak ?? true),
    effectStack:  cfg.effectStack || [],
    layers:       cfg.layers || {},
    output:       cfg.output || {},
    tagline: {
      text:          t.text,
      anchor:        t.anchor,
      offset_y:      (t.offset_y || 0) / 100.0,
      font_size_pct: (t.font_size_pct || 8) / 100.0,
      align:         t.align,
      orientation:   t.orientation,
      text_color: [
        parseInt(h.slice(0, 2), 16),
        parseInt(h.slice(2, 4), 16),
        parseInt(h.slice(4, 6), 16),
      ],
      shadow: t.shadow,
      glow:   t.glow,
    },
  };
}
</script>
